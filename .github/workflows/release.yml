name: Release

# Build installers on every version tag (e.g. v0.1.0) and upload them to a
# GitHub Release. electron-builder publishes to a *draft* release by default,
# so you can review the assets and write notes before hitting "Publish".
on:
  push:
    tags:
      - 'v*'

# Required so the built-in GITHUB_TOKEN can create the release and upload assets.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build bundles
        run: npm run build

      - name: Package & publish (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --${{ matrix.platform }} --publish always
