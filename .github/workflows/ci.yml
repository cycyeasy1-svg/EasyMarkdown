name: CI

# Sanity check on every push / PR: make sure the app still bundles cleanly.
# This does NOT package installers (that only runs on tags, in release.yml).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (main + preload + renderer)
        run: npm run build
